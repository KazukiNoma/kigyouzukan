  <style>
    .compare-hero {
      text-align: center;
      padding: 48px 24px 32px;
    }

    }
    .compare-hero p {

    }
    /* 業種フィルター */
    .industry-filter-area {
      max-width: 900px;

      display: flex;

      flex-wrap: wrap;
      justify-content: center;
    }
    .ind-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--ink3);
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ind-btn:hover, .ind-btn.active {

    }

    .company-selector {

    .search-select-input {
      width: 100%;

      cursor: pointer;

    .search-select-arrow {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ink3);
      font-size: 10px;
      pointer-events: none;
    }
    .search-select-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      overflow: hidden;

      overflow-y: auto;

    .search-select-dropdown.open { display: block; }
    .ssd-option {
      padding: 9px 12px;

      display: flex;

    .company-header-cell {

<script src="common.js"></script>
<script>
let companiesData = [];
let selectedIds = [null, null, null];
let currentFilter = 'all';

fetch('companies.json', { cache: 'no-store' })
  .then(r => r.json())
  .then(data => {
    companiesData = data;
    buildDropdowns(data);

    // URLパラメータから初期値
    const params = new URLSearchParams(location.search);
    const ids = (params.get('ids') || '').split(',').filter(Boolean);
    if (ids[0]) setSelection(1, ids[0]);
    if (ids[1]) setSelection(2, ids[1]);
    if (ids[2]) setSelection(3, ids[2]);
    if (ids.length >= 2) runCompare();
  });

/* ===== 業種フィルター ===== */
function filterIndustry(industry, btn) {
  currentFilter = industry;
  document.querySelectorAll('.ind-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  [1,2,3].forEach(n => renderDropList(n, document.getElementById('inp'+n).dataset.query || ''));
}

/* ===== カスタム検索セレクター ===== */
function buildDropdowns(data) {
  [1,2,3].forEach(n => {
    const inp = document.getElementById('inp'+n);
    inp.removeAttribute('readonly');
    inp.addEventListener('input', () => renderDropList(n, inp.value));
    inp.addEventListener('focus', () => openDrop(n));
    renderDropList(n, '');
  });
  document.addEventListener('click', e => {
    [1,2,3].forEach(n => {
      const wrap = document.getElementById('wrap'+n);
      if (wrap && !wrap.contains(e.target)) closeDrop(n);
    });
  });
}

function renderDropList(n, query) {
  const drop = document.getElementById('drop'+n);
  const inp  = document.getElementById('inp'+n);
  inp.dataset.query = query;
  const q = query.trim().toLowerCase();

  let filtered = companiesData.filter(c =>
    (currentFilter === 'all' || c.industry === currentFilter) &&
    (q === '' || c.nameShort.toLowerCase().includes(q) || c.name.toLowerCase().includes(q) || c.industry.includes(q))
  );

  if (filtered.length === 0) {
    drop.innerHTML = '<div class="ssd-no-result">該当企業がありません</div>';
    return;
  }

  drop.innerHTML = (n === 3 ? [{id:'', nameShort:'選択しない', industry:''}] : []).concat(filtered)
    .map(c => `
      <div class="ssd-option${selectedIds[n-1]===c.id?' selected':''}" data-id="${c.id}" onclick="setSelection(${n},'${c.id}')">
        ${c.industry ? `<span class="ssd-tag">${c.industry}</span>` : ''}
        <span>${c.nameShort || '選択しない'}</span>
      </div>`).join('');
}

function openDrop(n) {
  [1,2,3].forEach(i => { if(i!==n) closeDrop(i); });
  document.getElementById('drop'+n).classList.add('open');
  renderDropList(n, document.getElementById('inp'+n).dataset.query || '');
}

function closeDrop(n) {
  document.getElementById('drop'+n).classList.remove('open');
  // 選択中の企業名を表示に戻す
  const sel = selectedIds[n-1];
  const c = sel ? companiesData.find(x=>x.id===sel) : null;
  const inp = document.getElementById('inp'+n);
  inp.value = c ? c.nameShort : '';
  inp.dataset.query = '';
}

function setSelection(n, id) {
  selectedIds[n-1] = id || null;
  const c = id ? companiesData.find(x=>x.id===id) : null;
  const inp = document.getElementById('inp'+n);
  inp.value = c ? c.nameShort : '';
  inp.dataset.query = '';
  closeDrop(n);
}

function runCompare() {
  const ids = selectedIds.filter(Boolean);
  if (ids.length < 2) {
    alert('企業を2社以上選択してください');
    return;
  }
  history.replaceState(null, '', `compare.html?ids=${ids.join(',')}`);
  const selected = ids.map(id => companiesData.find(c => c.id === id)).filter(Boolean);
  renderCompare(selected);
  renderSimilarSuggest(selected);
}

/* ===== 類似企業サジェスト ===== */
function renderSimilarSuggest(selected) {
  const suggestEl = document.getElementById('similarSuggest');
  const chipsEl   = document.getElementById('similarChips');
  const currentIds = selected.map(c => c.id);

  // 選択中の企業のsimilarをすべて集めて重複除去
  const suggestIds = [...new Set(
    selected.flatMap(c => c.similar || [])
      .filter(id => !currentIds.includes(id))
  )].slice(0, 8);

  if (suggestIds.length === 0) { suggestEl.style.display = 'none'; return; }

  chipsEl.innerHTML = suggestIds.map(id => {
    const c = companiesData.find(x => x.id === id);
    if (!c) return '';
    const newIds = [...currentIds.slice(0, 2), id].join(',');
    return `<a class="similar-chip" href="compare.html?ids=${newIds}" onclick="addToCompare('${id}');return false;">
      + ${c.nameShort}
      <span style="font-size:10px;opacity:0.7;margin-left:3px">${c.industry}</span>
    </a>`;
  }).join('');

  suggestEl.style.display = 'block';
}

function addToCompare(id) {
  // 空きスロットに追加して再比較
  const emptySlot = selectedIds.findIndex(x => !x);
  if (emptySlot >= 0) {
    setSelection(emptySlot + 1, id);
  } else {
    setSelection(3, id); // 3枠目を上書き
  }
  runCompare();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderCompare(companies) {
  const wrap = document.getElementById('compareWrap');
  const content = document.getElementById('compareContent');
  wrap.classList.add('visible');

  // 最大値ハイライト用（dataRow内で個別に計算するためここには変数不要）

  // ヘッダー行
  const headerCells = companies.map(c => `
    <th>
      <div class="company-header-cell">
        <div class="company-header-name">${c.nameShort}</div>
        <span class="company-header-tag">${c.industry}</span>
      </div>
    </th>
  `).join('');

  // 基本データ行 (lowerIsBetter=true のとき最小値に👑)
  function dataRow(label, fn, isHighlight, lowerIsBetter) {
    const vals = companies.map(fn);
    const nums = vals.map(v => parseFloat(String(v).replace(/[^\d.]/g,'')) || 0);
    const hasValidNum = nums.some(n => n > 0);
    const bestNum = lowerIsBetter
      ? Math.min(...nums.filter(n => n > 0))
      : Math.max(...nums);
    return `<tr>
      <td class="label-col">${label}</td>
      ${companies.map((c, i) => {
        const raw = fn(c);
        const num = nums[i];
        const isBest = isHighlight && hasValidNum && num === bestNum && num > 0;
        return `<td><span class="${isBest ? 'val-best' : 'val-normal'}">${raw || '—'}${isBest ? ' 👑' : ''}</span></td>`;
      }).join('')}
    </tr>`;
  }

  // 社風スコア行
  function scoreRow(label, key) {
    const vals = companies.map(c => c.cultureScores?.[key] || 0);
    const maxVal = Math.max(...vals);
    return `<tr>
      <td class="label-col">${label}</td>
      ${companies.map((c, i) => {
        const val = vals[i];
        const isBest = val === maxVal && maxVal > 0;
        return `<td>
          <div class="score-bar-mini">
            <div class="score-bar-mini-bg"><div class="score-bar-mini-fill" style="width:${val}%"></div></div>
            <span class="score-num-mini" style="${isBest ? 'color:#10B981;font-weight:900' : ''}">${val || '—'}</span>
          </div>
        </td>`;
      }).join('')}
    </tr>`;
  }

  // すべての社風スコアキーを収集
  const allScoreKeys = [...new Set(companies.flatMap(c => Object.keys(c.cultureScores || {})))];

  content.innerHTML = `
    <div class="compare-section-title">📊 基本データ</div>
    <table class="compare-table">
      <thead><tr><th class="label-col">項目</th>${headerCells}</tr></thead>
      <tbody>
        ${dataRow('平均年収', c => c.avgSalary ? `${c.avgSalary.toLocaleString()}万円` : '—', true)}
        ${dataRow('売上高', c => c.revenue || '—', false)}
        ${dataRow('従業員数', c => c.employees || '—', false)}
        ${dataRow('平均年齢', c => c.avgAge ? `${c.avgAge}歳` : '—', true, true)}
        ${dataRow('平均勤続年数', c => c.avgTenure || '—', true)}
        ${dataRow('女性管理職比率', c => c.femaleMgrRatio || '—', true)}
        ${dataRow('本社', c => c.headquarters || '—', false)}
        ${dataRow('証券コード', c => c.ticker ? `${c.ticker}（東証P）` : '—', false)}
        <tr>
          <td class="label-col">詳細ページ</td>
          ${companies.map(c => `<td><a href="${c.url}" class="link-btn">詳細を見る →</a></td>`).join('')}
        </tr>
      </tbody>
    </table>

    ${allScoreKeys.length > 0 ? `
    <div class="compare-section-title">🎯 社風スコア比較</div>
    <table class="compare-table">
      <thead><tr><th class="label-col">スコア項目</th>${headerCells}</tr></thead>
      <tbody>
        ${allScoreKeys.map(key => scoreRow(key, key)).join('')}
      </tbody>
    </table>` : ''}

    <div style="margin-top:24px;padding:16px;background:rgba(168,85,247,0.06);border:1px solid rgba(168,85,247,0.15);border-radius:12px;font-size:12px;color:var(--ink3)">
      📌 出典：EDINET 有価証券報告書・各社IR資料｜👑 は比較企業中の最高値
    </div>

    <div style="margin-top:24px;text-align:center">
      <div style="font-size:13px;color:var(--ink3);margin-bottom:16px">転職・就活エージェントに相談する（無料）</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a href="https://www.recruit-agent.co.jp/" target="_blank" rel="noopener" style="padding:10px 20px;border-radius:20px;background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(236,72,153,0.1));border:1px solid rgba(168,85,247,0.3);color:#C084FC;text-decoration:none;font-size:13px;font-weight:600">💼 リクルートエージェント</a>
        <a href="https://doda.jp/" target="_blank" rel="noopener" style="padding:10px 20px;border-radius:20px;background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(236,72,153,0.1));border:1px solid rgba(168,85,247,0.3);color:#C084FC;text-decoration:none;font-size:13px;font-weight:600">🎯 doda</a>
        <a href="https://job.mynavi.jp/" target="_blank" rel="noopener" style="padding:10px 20px;border-radius:20px;background:linear-gradient(135deg,rgba(168,85,247,0.15),rgba(236,72,153,0.1));border:1px solid rgba(168,85,247,0.3);color:#C084FC;text-decoration:none;font-size:13px;font-weight:600">🎓 マイナビ</a>
      </div>
      <div style="font-size:11px;color:var(--ink3);margin-top:8px">※アフィリエイトリンクを含みます</div>
    </div>
  `;

  wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
