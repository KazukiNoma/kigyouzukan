<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI社風診断｜企業図鑑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0D0D12; --bg2: #13131A; --bg3: #1A1A24;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.12);
    --ink: #F0EFF8; --ink2: #B8B5CC; --ink3: #7A778E;
    --p1: #A855F7; --p2: #EC4899; --g1: #10B981;
    --grad: linear-gradient(135deg, #A855F7, #EC4899);
    --glow: 0 0 30px rgba(168,85,247,0.25);
  }
  body {
    font-family: 'Noto Sans JP', 'Space Grotesk', sans-serif;
    background: var(--bg); color: var(--ink);
    min-height: 100vh; line-height: 1.6;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* NAV */
  nav {
    background: rgba(13,13,18,0.85); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    padding: 0 24px; height: 58px; display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px;
    background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-back {
    font-size: 13px; color: var(--ink3); text-decoration: none;
    display: flex; align-items: center; gap: 6px; transition: color 0.15s;
  }
  .nav-back:hover { color: var(--p1); }

  /* MAIN */
  .main {
    position: relative; z-index: 1;
    max-width: 680px; margin: 0 auto; padding: 48px 16px 80px;
  }

  /* INTRO */
  .intro { text-align: center; margin-bottom: 48px; }
  .intro-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.3);
    border-radius: 20px; padding: 5px 14px; font-size: 12px; color: #C084FC;
    font-weight: 600; margin-bottom: 16px;
  }
  .intro-title {
    font-size: 36px; font-weight: 900; letter-spacing: -1px;
    line-height: 1.2; margin-bottom: 12px;
  }
  .intro-title span { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .intro-sub { font-size: 15px; color: var(--ink3); }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 32px; }
  .progress-header {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--ink3); margin-bottom: 8px;
  }
  .progress-bar-bg {
    height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--grad); border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px; margin-bottom: 24px;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-category {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--p1); margin-bottom: 10px;
  }
  .q-number {
    font-size: 12px; color: var(--ink3); margin-bottom: 6px;
    font-family: 'Space Grotesk', sans-serif;
  }
  .q-text {
    font-size: 18px; font-weight: 700; color: var(--ink);
    margin-bottom: 28px; line-height: 1.5;
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 12px; padding: 14px 18px;
    font-size: 14px; font-weight: 500; color: var(--ink2);
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.15s; text-align: left;
  }
  .option-btn:hover { border-color: var(--p1); color: var(--ink); background: rgba(168,85,247,0.06); }
  .option-btn.selected {
    border-color: var(--p1); color: var(--ink);
    background: rgba(168,85,247,0.12);
    box-shadow: 0 0 0 1px rgba(168,85,247,0.3);
  }
  .option-icon { font-size: 18px; flex-shrink: 0; }

  /* NAV BTNS */
  .nav-btns {
    display: flex; gap: 12px; justify-content: flex-end; margin-top: 8px;
  }
  .btn-prev {
    background: transparent; border: 1px solid var(--border2);
    color: var(--ink3); padding: 11px 24px; border-radius: 24px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .btn-prev:hover { border-color: var(--p1); color: var(--p1); }
  .btn-next {
    background: var(--grad); border: none; color: white;
    padding: 11px 28px; border-radius: 24px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    box-shadow: var(--glow); transition: all 0.2s; opacity: 0.4; pointer-events: none;
  }
  .btn-next.enabled { opacity: 1; pointer-events: auto; }
  .btn-next.enabled:hover { transform: translateY(-1px); box-shadow: 0 0 40px rgba(168,85,247,0.4); }

  /* RESULT */
  .result { display: none; animation: fadeUp 0.4s ease both; }
  .result-header { text-align: center; margin-bottom: 40px; }
  .result-title {
    font-size: 28px; font-weight: 900; margin-bottom: 8px;
  }
  .result-title span { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .result-sub { font-size: 14px; color: var(--ink3); }

  .result-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; margin-bottom: 16px;
    display: flex; gap: 20px; align-items: center;
    transition: all 0.2s; text-decoration: none; color: inherit;
    position: relative; overflow: hidden;
  }
  .result-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: var(--grad); opacity: 0; transition: opacity 0.2s;
  }
  .result-card:hover { border-color: rgba(168,85,247,0.4); transform: translateY(-2px); }
  .result-card:hover::before { opacity: 1; }

  .result-rank {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px; font-weight: 900; width: 44px; flex-shrink: 0;
    background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .result-logo {
    width: 52px; height: 52px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 800; font-family: 'Space Grotesk', sans-serif;
    border: 1px solid var(--border2);
  }
  .result-info { flex: 1; }
  .result-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .result-sub-text { font-size: 12px; color: var(--ink3); margin-bottom: 10px; }
  .result-match-bar-bg {
    height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-bottom: 4px;
  }
  .result-match-bar-fill { height: 100%; background: var(--grad); border-radius: 3px; }
  .result-match-label { font-size: 11px; color: var(--ink3); }
  .result-score {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; font-weight: 900; flex-shrink: 0; text-align: center;
  }
  .result-score span { font-size: 14px; color: var(--ink3); }

  .result-reasons {
    background: var(--bg3); border-radius: 12px; padding: 16px; margin-top: 14px;
  }
  .result-reason-title { font-size: 12px; font-weight: 700; color: var(--p1); margin-bottom: 8px; }
  .result-reason-item { font-size: 12px; color: var(--ink2); line-height: 1.8; }

  .result-actions { display: flex; gap: 12px; margin-top: 32px; justify-content: center; flex-wrap: wrap; }
  .btn-retry {
    background: transparent; border: 1px solid var(--border2);
    color: var(--ink2); padding: 11px 24px; border-radius: 24px;
    font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-retry:hover { border-color: var(--p1); color: var(--p1); }
  .btn-top {
    background: var(--grad); border: none; color: white;
    padding: 11px 28px; border-radius: 24px; text-decoration: none;
    font-size: 14px; font-weight: 600; box-shadow: var(--glow); transition: all 0.2s;
  }
  .btn-top:hover { transform: translateY(-1px); }

  @media (max-width: 480px) {
    .intro-title { font-size: 28px; }
    .q-text { font-size: 16px; }
    .result-card { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="top.html">企業図鑑</a>
  <a class="nav-back" href="top.html">← トップへ戻る</a>
</nav>

<div class="main">

  <!-- INTRO -->
  <div class="intro" id="introSection">
    <div class="intro-badge">🤖 AI社風診断</div>
    <h1 class="intro-title">あなたに合う企業を<br><span>診断しよう</span></h1>
    <p class="intro-sub">20問に答えるだけ。働き方・価値観から<br>ぴったりの企業TOP3を見つけます。</p>
    <br><br>
    <button class="btn-next enabled" onclick="startQuiz()" style="font-size:16px;padding:14px 40px">診断スタート →</button>
  </div>

  <!-- QUIZ -->
  <div id="quizSection" style="display:none">
    <div class="progress-wrap">
      <div class="progress-header">
        <span id="progressText">質問 1 / 20</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="q-category" id="qCategory"></div>
      <div class="q-number" id="qNumber"></div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsWrap"></div>
    </div>

    <div class="nav-btns">
      <button class="btn-prev" id="btnPrev" onclick="prevQ()" style="display:none">← 戻る</button>
      <button class="btn-next" id="btnNext" onclick="nextQ()">次へ →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result" id="resultSection">
    <div class="result-header">
      <div class="intro-badge">🎉 診断完了</div>
      <h2 class="result-title">あなたに合う企業<span>TOP3</span></h2>
      <p class="result-sub">回答をもとにマッチ度を算出しました</p>
    </div>
    <div id="resultCards"></div>
    <div class="result-actions">
      <button class="btn-retry" onclick="retryQuiz()">🔄 もう一度診断する</button>
      <a class="btn-top" href="top.html">企業一覧を見る →</a>
    </div>
  </div>

</div>

<script>
// ============================================================
// 質問データ
// ============================================================

  // 働き方・環境

  { cat: "🚀 キャリア志向", text: "将来的にどんなキャリアを歩みたいですか？", options: [

  // 年収・安定性

// ============================================================
// 診断ロジック
// ============================================================
let current = 0;
let answers = new Array(QUESTIONS.length).fill(null);

function startQuiz() {
  document.getElementById('introSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[current];
  document.getElementById('qCategory').textContent = q.cat;
  document.getElementById('qNumber').textContent = `質問 ${current + 1} / ${QUESTIONS.length}`;
  document.getElementById('qText').textContent = q.text;

  const wrap = document.getElementById('optionsWrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-icon">${opt.icon}</span><span>${opt.label}</span>`;
    btn.onclick = () => selectOption(i);
    wrap.appendChild(btn);
  });

  const pct = Math.round((current / QUESTIONS.length) * 100);
  document.getElementById('progressText').textContent = `質問 ${current + 1} / ${QUESTIONS.length}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  document.getElementById('btnPrev').style.display = current > 0 ? 'block' : 'none';

  const btnNext = document.getElementById('btnNext');
  btnNext.textContent = current === QUESTIONS.length - 1 ? '結果を見る 🎉' : '次へ →';
  if (answers[current] !== null) {
    btnNext.classList.add('enabled');
  } else {
    btnNext.classList.remove('enabled');
  }

  // アニメーションリセット
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';
}

function selectOption(i) {
  answers[current] = i;
  document.querySelectorAll('.option-btn').forEach((btn, idx) => {
    btn.classList.toggle('selected', idx === i);
  });
  document.getElementById('btnNext').classList.add('enabled');
}

function nextQ() {
  if (answers[current] === null) return;
  if (current < QUESTIONS.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQ() {
  if (current > 0) { current--; renderQuestion(); }
}

function showResult() {
  // スコア集計
  const totals = {};
  answers.forEach((ansIdx, qIdx) => {
    if (ansIdx === null) return;
    const scores = QUESTIONS[qIdx].options[ansIdx].scores;
    Object.entries(scores).forEach(([k, v]) => {
      totals[k] = (totals[k] || 0) + v;
    });
  });

  // マッチ度計算（コサイン類似度的な簡易計算）
  const ranked = COMPANIES.map(company => {
    let score = 0;
    let maxScore = 0;
    Object.entries(company.profile).forEach(([k, v]) => {
      const userVal = totals[k] || 0;
      score += userVal * v;
      maxScore += Math.abs(v) * 3;
    });
    const match = Math.min(99, Math.max(40, Math.round(50 + (score / Math.max(maxScore, 1)) * 50)));
    return { ...company, match };
  }).sort((a, b) => b.match - a.match);

  document.getElementById('quizSection').style.display = 'none';
  const resultSection = document.getElementById('resultSection');
  resultSection.style.display = 'block';

  const cards = document.getElementById('resultCards');
  cards.innerHTML = '';
  ranked.forEach((c, i) => {
    const rankLabel = ['🥇', '🥈', '🥉'][i] || (i + 1);
    const card = document.createElement('a');
    card.className = 'result-card';
    card.href = c.url;
    card.innerHTML = `
      <div class="result-rank">${rankLabel}</div>
      <div class="result-logo" style="${c.logoStyle}">
        <span style="${c.logoTextStyle}">${c.logo}</span>
      </div>
      <div class="result-info">
        <div class="result-name">${c.short}</div>
        <div class="result-sub-text">${c.sub}</div>
        <div class="result-match-bar-bg">
          <div class="result-match-bar-fill" style="width:${c.match}%"></div>
        </div>
        <div class="result-match-label">マッチ度 ${c.match}%</div>
        <div class="result-reasons">
          <div class="result-reason-title">✅ マッチする理由</div>
          ${c.reasons.map(r => `<div class="result-reason-item">・${r}</div>`).join('')}
        </div>
      </div>
      <div class="result-score" style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">
        ${c.match}<span style="-webkit-text-fill-color:var(--ink3)">%</span>
      </div>
    `;
    cards.appendChild(card);
  });
}

function retryQuiz() {
  current = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  renderQuestion();
}
